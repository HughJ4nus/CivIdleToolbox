<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
      <title>CivIdle Toolbox</title>
      <style>
         :root {
            color-scheme: dark;
            --bg: #0a0a0a;
            --panel: #161616;
            --panel-2: #1f1f1f;
            --border: #2a2a2a;
            --text: #e6e6e6;
            --text-dim: #9a9a9a;
            --accent: #4a9eff;
         }
         * { box-sizing: border-box; }
         html, body { margin: 0; padding: 0; height: 100%; }
         body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
         }
         header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 14px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex: 0 0 auto;
         }
         label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
         }
         select {
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
            font-family: inherit;
            font-size: 13px;
            min-width: 180px;
         }
         .brand {
            font-weight: 600;
            color: var(--text);
            margin-right: 8px;
         }
         .spacer { flex: 1 1 auto; }
         .repo-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 12px;
         }
         .repo-link:hover { color: var(--accent); }
         iframe {
            flex: 1 1 auto;
            width: 100%;
            border: 0;
            display: block;
            background: var(--bg);
         }
         .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            flex: 1 1 auto;
         }
      </style>
   </head>
   <body>
      <header>
         <span class="brand">CivIdle Toolbox</span>
         <label>
            Tool
            <select id="tool-picker"></select>
         </label>
         <span class="spacer"></span>
         <a class="repo-link" href="https://github.com/HughJ4nus/CivIdleToolbox" target="_blank" rel="noopener">github</a>
      </header>
      <iframe id="tool-frame" title="Selected tool"></iframe>

      <script>
         // To add a tool: build it under <repo-name>/<id>/ on gh-pages and
         // register it here. The path is relative to this landing page,
         // so subdir names just work.
         const TOOLS = [
            { id: "hex-map", path: "hex-map/", name: "Hex Map" },
            { id: "egp-planner", path: "egp-planner/", name: "EGP Run Planner" },
         ];

         const picker = document.getElementById("tool-picker");
         const frame = document.getElementById("tool-frame");

         for (const t of TOOLS) {
            const opt = document.createElement("option");
            opt.value = t.id;
            opt.textContent = t.name;
            picker.appendChild(opt);
         }

         const STORAGE_KEY = "cividle-toolbox:last-tool";
         const fromHash = (location.hash || "").replace(/^#/, "");
         const fromStorage = (() => {
            try { return localStorage.getItem(STORAGE_KEY) || ""; }
            catch { return ""; }
         })();
         const initial =
            TOOLS.find((t) => t.id === fromHash) ??
            TOOLS.find((t) => t.id === fromStorage) ??
            TOOLS[0];

         const select = (id) => {
            const tool = TOOLS.find((t) => t.id === id);
            if (!tool) return;
            picker.value = tool.id;
            frame.src = tool.path;
            history.replaceState(null, "", "#" + tool.id);
            try { localStorage.setItem(STORAGE_KEY, tool.id); } catch {}
         };

         picker.addEventListener("change", () => select(picker.value));
         window.addEventListener("hashchange", () => {
            const id = (location.hash || "").replace(/^#/, "");
            if (id && id !== picker.value) select(id);
         });

         select(initial.id);
      </script>
   </body>
</html>
